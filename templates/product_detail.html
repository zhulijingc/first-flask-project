<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>商品详情</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
        }

        .box {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .price {
            color: red;
            font-size: 24px;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>{{product[1]}}</h1>
    <p class="price">￥{{product[2]}}</p>
    <p>{{product[3]}}</p>

    <a href="/products" class="btn">返回列表</a>
</div>

</body>
</html>
