<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>商品列表</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            background: white;
            width: 220px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .price {
            color: red;
            font-weight: bold;
            margin: 10px 0;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h1>🛒 商品列表</h1>

<div class="container">
    {% for p in products %}
        <div class="card">
            <h3>{{p[1]}}</h3>
            <p class="price">￥{{p[2]}}</p>

            <a href="/product/{{p[0]}}" class="btn">
                查看详情
            </a>
        </div>
    {% endfor %}
</div>

</body>
</html>
